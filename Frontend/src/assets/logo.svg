<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C41E3A"/>
      <stop offset="100%" style="stop-color:#8B0000"/>
    </linearGradient>
    <linearGradient id="innerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.05"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="200" height="200" rx="40" fill="url(#bgGrad)"/>
  <!-- Inner glow -->
  <rect x="2" y="2" width="196" height="196" rx="38" fill="url(#innerGrad)"/>
  <!-- Building icon -->
  <g transform="translate(50, 42)">
    <!-- Main building -->
    <rect x="10" y="20" width="80" height="80" rx="4" fill="rgba(255,255,255,0.2)"/>
    <rect x="10" y="20" width="80" height="80" rx="4" stroke="white" stroke-width="2.5" fill="none"/>
    <!-- Windows -->
    <rect x="22" y="32" width="14" height="12" rx="2" fill="rgba(255,255,255,0.9)"/>
    <rect x="44" y="32" width="14" height="12" rx="2" fill="rgba(255,255,255,0.9)"/>
    <rect x="66" y="32" width="14" height="12" rx="2" fill="rgba(255,255,255,0.9)"/>
    <rect x="22" y="52" width="14" height="12" rx="2" fill="rgba(255,255,255,0.9)"/>
    <rect x="44" y="52" width="14" height="12" rx="2" fill="rgba(255,255,255,0.9)"/>
    <rect x="66" y="52" width="14" height="12" rx="2" fill="rgba(255,255,255,0.9)"/>
    <rect x="22" y="72" width="14" height="12" rx="2" fill="rgba(255,255,255,0.6)"/>
    <rect x="44" y="72" width="14" height="12" rx="2" fill="rgba(255,255,255,0.6)"/>
    <rect x="66" y="72" width="14" height="12" rx="2" fill="rgba(255,255,255,0.6)"/>
    <!-- Door -->
    <rect x="40" y="72" width="20" height="28" rx="3" fill="white"/>
    <!-- Roof accent -->
    <rect x="5" y="16" width="90" height="6" rx="3" fill="white"/>
  </g>
  <!-- TKİ text -->
  <text x="100" y="168" font-family="Arial, sans-serif" font-size="28" font-weight="900" fill="white" text-anchor="middle" letter-spacing="6">TKİ</text>
</svg>
